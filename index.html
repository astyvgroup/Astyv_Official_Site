    <meta name="theme-color" content="__ASTYV_THEME_COLOR__" />
    <meta name="color-scheme" content="dark light" />

    <!-- Theme bootstrap (runs before React) — reads stored preference, falls
         back to OS preference, defaults to dark. Must be inline + early to
         avoid a flash of wrong theme on first paint. -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('astyv:theme');
          var pref = stored || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          var html = document.documentElement;
          html.classList.remove('dark', 'light');
          html.classList.add(pref);
        } catch (e) {}
      })();
    </script>

    <!-- SPA fallback: handle GitHub Pages deep-link redirect from 404.html -->
    <script>
      (function() {
        try {
          var stored = sessionStorage.getItem('astyv:redirect');
          if (stored) {
            sessionStorage.removeItem('astyv:redirect');
            history.replaceState(null, null, stored);
          }
        } catch (e) {}
      })();
